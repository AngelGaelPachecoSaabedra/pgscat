# Nginx reverse-proxy configuration for pgs-dashboard
# Place in /etc/nginx/conf.d/pgs-dashboard.conf (or include from nginx.conf)
# TLS certificates managed externally (Certbot / Let's Encrypt / internal CA).

server {
    listen 80;
    server_name your-domain.example.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.example.com;

    ssl_certificate     /etc/ssl/certs/pgs-dashboard.crt;
    ssl_certificate_key /etc/ssl/private/pgs-dashboard.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy to Gunicorn
    location / {
        proxy_pass          http://127.0.0.1:8080;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host  $host;
        proxy_read_timeout  120s;
    }

    # Restrict admin endpoints — adjust CIDR to your trusted network
    location /api/admin/ {
        allow 10.0.0.0/8;
        deny  all;
        proxy_pass http://127.0.0.1:8080;
    }

    # Optional: static file caching
    location /static/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400";
    }
}
